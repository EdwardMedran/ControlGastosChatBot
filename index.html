<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Chatbot</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f5f4f0;
    --surface: #ffffff;
    --surface2: #f0eeea;
    --border: #e2dfd8;
    --accent: #5b4fcf;
    --accent-light: #ede9ff;
    --accent2: #7b6fe8;
    --text: #1a1a2e;
    --muted: #8a8799;
    --user-bg: #5b4fcf;
    --user-text: #ffffff;
    --ai-bg: #ffffff;
    --radius: 18px;
    --font: 'Inter', sans-serif;
    --mono: 'JetBrains Mono', monospace;
    --shadow: 0 2px 12px rgba(0,0,0,0.07);
  }

  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--text);
    height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
  }

  /* ── TOPBAR ── */
  #topbar {
    padding: 14px 20px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
    box-shadow: var(--shadow);
    position: relative;
    z-index: 10;
  }

  .topbar-brand { display: flex; align-items: center; gap: 10px; }

  .logo-wrap {
    width: 36px; height: 36px;
    border-radius: 10px;
    background: var(--accent-light);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }

  .logo-icon {
    width: 18px; height: 18px;
    background: var(--accent);
    border-radius: 5px;
    position: relative;
  }

  .logo-icon::after {
    content: '';
    position: absolute;
    bottom: -4px; left: 4px;
    width: 0; height: 0;
    border-left: 5px solid transparent;
    border-right: 2px solid transparent;
    border-top: 5px solid var(--accent);
  }

  .topbar-info { display: flex; flex-direction: column; }
  .topbar-title { font-size: 15px; font-weight: 700; color: var(--text); letter-spacing: -0.3px; }
  .topbar-subtitle { font-size: 11px; color: var(--muted); margin-top: 1px; }

  .topbar-status {
    display: flex; align-items: center; gap: 6px;
    font-size: 11px; color: var(--muted);
  }

  .status-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: #22c55e;
    box-shadow: 0 0 0 2px #dcfce7;
  }

  .icon-btn {
    width: 36px; height: 36px;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--muted);
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px;
    transition: all 0.15s;
    -webkit-tap-highlight-color: transparent;
  }

  .icon-btn:hover, .icon-btn:active { background: var(--accent-light); color: var(--accent); border-color: var(--accent); }

  /* ── MESSAGES ── */
  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 20px 16px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    scroll-behavior: smooth;
    -webkit-overflow-scrolling: touch;
  }

  #messages::-webkit-scrollbar { display: none; }

  /* ── WELCOME ── */
  .welcome {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    text-align: center;
    padding: 32px 16px;
  }

  .welcome-avatar {
    width: 64px; height: 64px;
    border-radius: 20px;
    background: var(--accent-light);
    display: flex; align-items: center; justify-content: center;
    margin-bottom: 4px;
    box-shadow: 0 4px 20px rgba(91,79,207,0.15);
  }

  .welcome-avatar-inner {
    width: 32px; height: 32px;
    background: var(--accent);
    border-radius: 10px;
    position: relative;
  }

  .welcome-avatar-inner::after {
    content: '';
    position: absolute;
    bottom: -6px; left: 6px;
    width: 0; height: 0;
    border-left: 7px solid transparent;
    border-right: 3px solid transparent;
    border-top: 7px solid var(--accent);
  }

  .welcome-title { font-size: 20px; font-weight: 700; color: var(--text); letter-spacing: -0.5px; }
  .welcome-sub { font-size: 14px; color: var(--muted); max-width: 280px; line-height: 1.6; }

  .welcome-hints {
    display: flex;
    flex-direction: column;
    gap: 8px;
    width: 100%;
    max-width: 320px;
    margin-top: 8px;
  }

  .hint-chip {
    font-size: 13px;
    padding: 12px 16px;
    border-radius: 14px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text);
    cursor: pointer;
    transition: all 0.15s;
    text-align: left;
    display: flex; align-items: center; gap: 8px;
    box-shadow: var(--shadow);
    -webkit-tap-highlight-color: transparent;
    font-family: var(--font);
  }

  .hint-chip::before { content: '→'; color: var(--accent); font-weight: 600; }
  .hint-chip:hover, .hint-chip:active { background: var(--accent-light); border-color: var(--accent); color: var(--accent); }

  /* ── MESSAGES ── */
  .msg { display: flex; gap: 8px; animation: fadeUp 0.2s ease; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .msg.user { flex-direction: row-reverse; align-self: flex-end; max-width: 85%; }
  .msg.ai   { align-self: flex-start; max-width: 92%; margin-left: 6px; }

  .msg-avatar {
    width: 30px; height: 30px; min-width: 30px;
    border-radius: 9px;
    display: flex; align-items: center; justify-content: center;
    font-weight: 700;
    align-self: flex-end;
    font-family: var(--mono);
    font-size: 9px;
    letter-spacing: 0.5px;
    flex-shrink: 0;
  }

  .msg.ai .msg-avatar   { background: var(--accent-light); color: var(--accent); }
  .msg.user .msg-avatar { background: var(--accent); color: white; }

  .msg-body { min-width: 0; display: flex; flex-direction: column; gap: 4px; }
  .msg.user .msg-body { align-items: flex-end; }

  .msg-bubble {
    padding: 12px 15px;
    border-radius: var(--radius);
    font-size: 14px;
    line-height: 1.7;
    box-shadow: var(--shadow);
  }

  .msg.ai .msg-bubble {
    background: var(--ai-bg);
    border: 1px solid var(--border);
    border-bottom-left-radius: 5px;
    color: var(--text);
  }

  .msg.user .msg-bubble {
    background: var(--user-bg);
    border-bottom-right-radius: 5px;
    color: var(--user-text);
  }

  .msg-bubble h2 { font-size: 14px; font-weight: 700; margin: 10px 0 5px; color: var(--text); }
  .msg-bubble h3 { font-size: 13px; font-weight: 600; margin: 8px 0 4px; color: var(--text); }
  .msg-bubble ul, .msg-bubble ol { padding-left: 18px; margin: 5px 0; }
  .msg-bubble li { margin: 2px 0; }
  .msg-bubble blockquote { border-left: 3px solid var(--accent); padding-left: 10px; margin: 6px 0; color: var(--muted); font-style: italic; }
  .msg-bubble strong { font-weight: 600; }

  .msg-time { font-size: 10px; color: var(--muted); padding: 0 4px; }

  .msg-sources { display: none; }

  .source-chip {
    font-size: 10px;
    padding: 3px 9px;
    border-radius: 20px;
    background: var(--accent-light);
    border: 1px solid rgba(91,79,207,0.2);
    color: var(--accent);
    font-family: var(--mono);
    display: flex; align-items: center; gap: 4px;
  }

  /* ── TYPING ── */
  .typing-indicator {
    display: flex; align-items: center; gap: 4px;
    padding: 14px 16px;
    background: var(--ai-bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    border-bottom-left-radius: 5px;
    width: fit-content;
    box-shadow: var(--shadow);
  }

  .typing-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--muted);
    animation: blink 1.2s ease-in-out infinite;
  }

  .typing-dot:nth-child(2) { animation-delay: 0.2s; }
  .typing-dot:nth-child(3) { animation-delay: 0.4s; }

  @keyframes blink {
    0%, 80%, 100% { opacity: 0.2; transform: scale(0.8); }
    40% { opacity: 1; transform: scale(1.1); }
  }

  /* ── INPUT ── */
  #input-area {
    flex-shrink: 0;
    padding: 12px 16px 20px;
    background: var(--surface);
    border-top: 1px solid var(--border);
    padding-bottom: max(20px, env(safe-area-inset-bottom));
  }

  .input-wrapper {
    display: flex;
    align-items: flex-end;
    gap: 10px;
    background: var(--surface2);
    border: 1.5px solid var(--border);
    border-radius: 24px;
    padding: 10px 10px 10px 16px;
    transition: border-color 0.2s, box-shadow 0.2s;
  }

  .input-wrapper:focus-within {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-light);
    background: var(--surface);
  }

  #user-input {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: var(--text);
    font-family: var(--font);
    font-size: 15px;
    line-height: 1.5;
    resize: none;
    max-height: 100px;
    min-height: 24px;
  }

  #user-input::placeholder { color: var(--muted); }

  #send-btn {
    width: 38px; height: 38px; min-width: 38px;
    border-radius: 12px;
    border: none;
    background: var(--accent);
    color: #fff;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px;
    transition: all 0.15s;
    align-self: flex-end;
    box-shadow: 0 2px 8px rgba(91,79,207,0.35);
    -webkit-tap-highlight-color: transparent;
  }

  #send-btn:hover { background: var(--accent2); transform: scale(1.05); }
  #send-btn:active { transform: scale(0.93); }
  #send-btn:disabled { background: var(--border); box-shadow: none; cursor: not-allowed; transform: none; }

  .input-hint {
    font-size: 11px;
    color: var(--muted);
    margin-top: 7px;
    text-align: center;
    display: none;
  }

  @media (min-width: 600px) {
    .input-hint { display: block; }
    #messages { padding: 28px 24px; max-width: 720px; margin: 0 auto; width: 100%; align-self: center; }
    #input-area { max-width: 720px; margin: 0 auto; width: 100%; align-self: center; }
    .msg.user { max-width: 75%; }
    .msg.ai   { max-width: 85%; }
    .welcome-hints { flex-direction: row; flex-wrap: wrap; justify-content: center; max-width: 500px; }
    .hint-chip { flex: 1; min-width: 140px; }
  }

  .input-hint kbd {
    font-family: var(--mono);
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 1px 5px;
    font-size: 10px;
  }
</style>
</head>
<body>

<div id="topbar">
  <div class="topbar-brand">
    <div class="logo-wrap">
      <div class="logo-icon"></div>
    </div>
    <div class="topbar-info">
      <span class="topbar-title">Chatbot</span>
      <span class="topbar-subtitle">Consulta tus documentos con IA</span>
    </div>
  </div>
  <div style="display:flex;align-items:center;gap:10px">
    <div class="topbar-status">
      <div class="status-dot"></div>
      <span>En línea</span>
    </div>
    <button class="icon-btn" title="Limpiar chat" onclick="clearChat()">🗑</button>
  </div>
</div>

<div id="messages">
  <div class="welcome" id="welcome">
    <div class="welcome-avatar">
      <div class="welcome-avatar-inner"></div>
    </div>
    <div class="welcome-title">Hola, ¿en qué te ayudo?</div>
    <div class="welcome-sub">Consulta cualquier cosa sobre tus documentos y te responderé con fuentes.</div>
    <div class="welcome-hints">
      <span class="hint-chip" onclick="useHint(this)">¿Cuáles son los derechos fundamentales?</span>
      <span class="hint-chip" onclick="useHint(this)">¿Qué dice sobre el presidente?</span>
      <span class="hint-chip" onclick="useHint(this)">¿Cómo se reforma la constitución?</span>
    </div>
  </div>
</div>

<div id="input-area">
  <div class="input-wrapper">
    <textarea id="user-input" placeholder="Escribe tu pregunta..." rows="1" onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
    <button id="send-btn" onclick="sendMessage()" title="Enviar">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <line x1="22" y1="2" x2="11" y2="13"></line>
        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
      </svg>
    </button>
  </div>
  <div class="input-hint"><kbd>Enter</kbd> para enviar &nbsp;·&nbsp; <kbd>Shift+Enter</kbd> nueva línea</div>
</div>

<script>
  let isLoading = false;
  const LAMBDA_URL = "https://ah5tamym3lutzpcgilotqooj3m0vktgq.lambda-url.sa-east-1.on.aws/";

  async function callRAG(question) {
    const res = await fetch(LAMBDA_URL, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ question }),
    });
    if (!res.ok) throw new Error(`Error ${res.status}`);
    const data = await res.json();
    return { text: data.answer, sources: data.sources || [] };
  }

  function renderMarkdown(text) {
    return text
      .replace(/^## (.+)$/gm, '<h2>$1</h2>')
      .replace(/^### (.+)$/gm, '<h3>$1</h3>')
      .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
      .replace(/\*(.+?)\*/g, '<em>$1</em>')
      .replace(/^> (.+)$/gm, '<blockquote>$1</blockquote>')
      .replace(/^- (.+)$/gm, '<li>$1</li>')
      .replace(/^(\d+)\. (.+)$/gm, '<li>$2</li>')
      .replace(/\n\n/g, '<br><br>')
      .replace(/\n/g, '<br>');
  }

  function useHint(el) {
    document.getElementById('user-input').value = el.textContent.trim();
    sendMessage();
  }

  function clearChat() {
    document.getElementById('messages').innerHTML = `
      <div class="welcome" id="welcome">
        <div class="welcome-avatar"><div class="welcome-avatar-inner"></div></div>
        <div class="welcome-title">Hola, ¿en qué te ayudo?</div>
        <div class="welcome-sub">Consulta cualquier cosa sobre tus documentos.</div>
        <div class="welcome-hints">
          <span class="hint-chip" onclick="useHint(this)">¿Cuáles son los derechos fundamentales?</span>
          <span class="hint-chip" onclick="useHint(this)">¿Qué dice sobre el presidente?</span>
          <span class="hint-chip" onclick="useHint(this)">¿Cómo se reforma la constitución?</span>
        </div>
      </div>`;
  }

  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 100) + 'px';
  }

  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  }

  async function sendMessage() {
    const input = document.getElementById('user-input');
    const text = input.value.trim();
    if (!text || isLoading) return;

    isLoading = true;
    document.getElementById('send-btn').disabled = true;

    const msgs = document.getElementById('messages');
    document.getElementById('welcome')?.remove();

    msgs.appendChild(createMsg('user', text));
    input.value = '';
    input.style.height = 'auto';

    const typing = document.createElement('div');
    typing.className = 'msg ai';
    typing.id = 'typing';
    typing.innerHTML = `
      <div class="msg-avatar">AI</div>
      <div class="msg-body">
        <div class="typing-indicator">
          <div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div>
        </div>
      </div>`;
    msgs.appendChild(typing);
    msgs.scrollTop = msgs.scrollHeight;

    try {
      const res = await callRAG(text);
      document.getElementById('typing')?.remove();
      msgs.appendChild(createMsg('ai', res.text, res.sources));
    } catch(e) {
      document.getElementById('typing')?.remove();
      msgs.appendChild(createMsg('ai', 'Error al conectar con el backend. Intenta de nuevo.'));
    }

    msgs.scrollTop = msgs.scrollHeight;
    isLoading = false;
    document.getElementById('send-btn').disabled = false;
    input.focus();
  }

  function createMsg(role, text, sources = []) {
    const el = document.createElement('div');
    el.className = `msg ${role}`;
    const now = new Date().toLocaleTimeString('es', { hour: '2-digit', minute: '2-digit' });
    const sourcesHtml = sources.length
      ? `<div class="msg-sources">${sources.map(s => `<span class="source-chip">📄 ${s}</span>`).join('')}</div>`
      : '';
    const content = role === 'ai' ? renderMarkdown(text) : text;
    el.innerHTML = `
      <div class="msg-avatar">${role === 'ai' ? 'AI' : 'TÚ'}</div>
      <div class="msg-body">
        <div class="msg-bubble">${content}</div>
        ${sourcesHtml}
        <div class="msg-time">${now}</div>
      </div>`;
    return el;
  }
</script>
</body>
</html>
