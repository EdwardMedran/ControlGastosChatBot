<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chatbot</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0f0f11; --surface: #17171a; --surface2: #1e1e22; --border: #2a2a2f;
    --accent: #7c6dfa; --accent2: #a594ff; --text: #e8e8f0; --muted: #6e6e80;
    --user-bubble: #1d1b3a; --ai-bubble: #17171a; --radius: 14px;
    --font: 'Syne', sans-serif; --mono: 'DM Mono', monospace;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: var(--font); background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
  #topbar { padding: 14px 32px; border-bottom: 1px solid var(--border); background: var(--surface); display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
  .topbar-brand { display: flex; align-items: center; gap: 10px; }
  .logo-dot { width: 8px; height: 8px; background: var(--accent); border-radius: 50%; box-shadow: 0 0 10px var(--accent); animation: pulse 2s ease-in-out infinite; flex-shrink: 0; }
  @keyframes pulse { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.5; transform: scale(0.8); } }
  .topbar-title { font-size: 16px; font-weight: 700; letter-spacing: -0.3px; }
  .topbar-subtitle { font-size: 11px; color: var(--muted); margin-left: 4px; font-weight: 400; }
  .icon-btn { width: 34px; height: 34px; border-radius: 9px; border: 1px solid var(--border); background: transparent; color: var(--muted); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 15px; transition: background 0.15s, color 0.15s; }
  .icon-btn:hover { background: var(--surface2); color: var(--text); }
  #messages { flex: 1; overflow-y: auto; padding: 32px; display: flex; flex-direction: column; gap: 22px; scroll-behavior: smooth; max-width: 860px; width: 100%; margin: 0 auto; align-self: center; }
  #messages::-webkit-scrollbar { width: 4px; }
  #messages::-webkit-scrollbar-track { background: transparent; }
  #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
  .welcome { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 14px; text-align: center; padding: 40px 0; }
  .welcome-glyph { font-size: 42px; line-height: 1; }
  .welcome-title { font-size: 22px; font-weight: 700; letter-spacing: -0.5px; }
  .welcome-sub { font-size: 13px; color: var(--muted); max-width: 340px; line-height: 1.7; }
  .welcome-hints { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-top: 8px; }
  .hint-chip { font-size: 12px; padding: 7px 14px; border-radius: 20px; border: 1px solid var(--border); background: var(--surface); color: var(--muted); cursor: pointer; transition: border-color 0.15s, color 0.15s; }
  .hint-chip:hover { border-color: var(--accent); color: var(--accent2); }
  .msg { display: flex; gap: 12px; animation: fadeUp 0.22s ease; }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  .msg.user { flex-direction: row-reverse; align-self: flex-end; max-width: 75%; }
  .msg.ai { align-self: flex-start; max-width: 90%; }
  .msg-avatar { width: 32px; height: 32px; min-width: 32px; border-radius: 9px; display: flex; align-items: center; justify-content: center; font-weight: 700; align-self: flex-start; font-family: var(--mono); font-size: 10px; letter-spacing: 0.5px; }
  .msg.ai .msg-avatar { background: rgba(124,109,250,0.15); color: var(--accent2); }
  .msg.user .msg-avatar { background: var(--user-bubble); color: var(--accent2); }
  .msg-body { min-width: 0; }
  .msg-meta { font-size: 11px; color: var(--muted); margin-bottom: 5px; display: flex; align-items: center; gap: 6px; }
  .msg.user .msg-meta { justify-content: flex-end; }
  .msg-bubble { padding: 13px 17px; border-radius: var(--radius); font-size: 14px; line-height: 1.75; }
  .msg.ai .msg-bubble { background: var(--ai-bubble); border: 1px solid var(--border); border-top-left-radius: 4px; color: var(--text); }
  .msg.user .msg-bubble { background: var(--user-bubble); border: 1px solid rgba(124,109,250,0.2); border-top-right-radius: 4px; color: var(--text); }
  .msg-bubble h2 { font-size: 15px; font-weight: 600; margin: 12px 0 6px; color: var(--text); }
  .msg-bubble h3 { font-size: 14px; font-weight: 600; margin: 10px 0 4px; color: var(--text); }
  .msg-bubble ul, .msg-bubble ol { padding-left: 20px; margin: 6px 0; }
  .msg-bubble li { margin: 3px 0; }
  .msg-bubble blockquote { border-left: 3px solid var(--accent); padding-left: 10px; margin: 6px 0; color: var(--muted); }
  .msg-bubble strong { font-weight: 600; color: var(--text); }
  .msg-sources { margin-top: 9px; display: flex; flex-wrap: wrap; gap: 6px; }
  .source-chip { font-size: 10px; padding: 3px 10px; border-radius: 20px; background: rgba(124,109,250,0.08); border: 1px solid rgba(124,109,250,0.2); color: var(--accent2); font-family: var(--mono); }
  .typing-indicator { display: flex; align-items: center; gap: 5px; padding: 13px 17px; background: var(--ai-bubble); border: 1px solid var(--border); border-radius: var(--radius); border-top-left-radius: 4px; width: fit-content; }
  .typing-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--muted); animation: blink 1.2s ease-in-out infinite; }
  .typing-dot:nth-child(2) { animation-delay: 0.2s; }
  .typing-dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes blink { 0%, 80%, 100% { opacity: 0.2; transform: scale(0.8); } 40% { opacity: 1; transform: scale(1); } }
  #input-area { flex-shrink: 0; padding: 16px 32px 22px; border-top: 1px solid var(--border); background: var(--surface); max-width: 860px; width: 100%; margin: 0 auto; align-self: center; }
  .input-wrapper { display: flex; align-items: flex-end; gap: 10px; background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius); padding: 10px 12px; transition: border-color 0.2s; }
  .input-wrapper:focus-within { border-color: rgba(124,109,250,0.45); }
  #user-input { flex: 1; background: transparent; border: none; outline: none; color: var(--text); font-family: var(--font); font-size: 14px; line-height: 1.5; resize: none; max-height: 120px; min-height: 24px; }
  #user-input::placeholder { color: var(--muted); }
  #send-btn { width: 36px; height: 36px; min-width: 36px; border-radius: 9px; border: none; background: var(--accent); color: #fff; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 15px; transition: background 0.15s, transform 0.1s; align-self: flex-end; }
  #send-btn:hover { background: var(--accent2); }
  #send-btn:active { transform: scale(0.92); }
  #send-btn:disabled { background: var(--border); cursor: not-allowed; }
  .input-hint { font-size: 11px; color: var(--muted); margin-top: 8px; text-align: center; }
  .input-hint kbd { font-family: var(--mono); background: var(--surface2); border: 1px solid var(--border); border-radius: 4px; padding: 1px 5px; font-size: 10px; }
</style>
</head>
<body>

<div id="topbar">
  <div class="topbar-brand">
    <div class="logo-dot"></div>
    <span class="topbar-title">Chatbot</span>
    <span class="topbar-subtitle">Consulta tus documentos con IA</span>
  </div>
  <button class="icon-btn" title="Limpiar chat" onclick="clearChat()">🗑</button>
</div>

<div id="messages">
  <div class="welcome" id="welcome">
    <div class="welcome-glyph">💬</div>
    <div class="welcome-title">Haz tu primera pregunta</div>
    <div class="welcome-sub">Consulta cualquier cosa. La IA buscará en tus documentos y responderá con fuentes.</div>
    <div class="welcome-hints">
      <span class="hint-chip" onclick="useHint(this)">¿Cuáles son los derechos fundamentales?</span>
      <span class="hint-chip" onclick="useHint(this)">¿Qué dice sobre el presidente?</span>
      <span class="hint-chip" onclick="useHint(this)">¿Cómo se reforma la constitución?</span>
    </div>
  </div>
</div>

<div id="input-area">
  <div class="input-wrapper">
    <textarea id="user-input" placeholder="Pregunta algo sobre tus documentos..." rows="1" onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
    <button id="send-btn" onclick="sendMessage()" title="Enviar">➤</button>
  </div>
  <div class="input-hint"><kbd>Enter</kbd> para enviar &nbsp;·&nbsp; <kbd>Shift+Enter</kbd> nueva línea</div>
</div>

<script>
  let isLoading = false;
  const LAMBDA_URL = "https://ah5tamym3lutzpcgilotqooj3m0vktgq.lambda-url.sa-east-1.on.aws/";

  async function callRAG(question) {
    const res = await fetch(LAMBDA_URL, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ question }),
    });
    if (!res.ok) throw new Error(`Error ${res.status}`);
    const data = await res.json();
    return { text: data.answer, sources: data.sources || [] };
  }

  function renderMarkdown(text) {
    return text
      .replace(/^## (.+)$/gm, '<h2>$1</h2>')
      .replace(/^### (.+)$/gm, '<h3>$1</h3>')
      .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
      .replace(/\*(.+?)\*/g, '<em>$1</em>')
      .replace(/^> (.+)$/gm, '<blockquote>$1</blockquote>')
      .replace(/^- (.+)$/gm, '<li>$1</li>')
      .replace(/^(\d+)\. (.+)$/gm, '<li>$2</li>')
      .replace(/\n\n/g, '<br><br>')
      .replace(/\n/g, '<br>');
  }

  function useHint(el) {
    document.getElementById('user-input').value = el.textContent;
    sendMessage();
  }

  function clearChat() {
    document.getElementById('messages').innerHTML = `
      <div class="welcome" id="welcome">
        <div class="welcome-glyph">💬</div>
        <div class="welcome-title">Chat limpio</div>
        <div class="welcome-sub">Empieza una nueva consulta sobre tus documentos.</div>
        <div class="welcome-hints">
          <span class="hint-chip" onclick="useHint(this)">¿Cuáles son los derechos fundamentales?</span>
          <span class="hint-chip" onclick="useHint(this)">¿Qué dice sobre el presidente?</span>
          <span class="hint-chip" onclick="useHint(this)">¿Cómo se reforma la constitución?</span>
        </div>
      </div>`;
  }

  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 120) + 'px';
  }

  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  }

  async function sendMessage() {
    const input = document.getElementById('user-input');
    const text = input.value.trim();
    if (!text || isLoading) return;

    isLoading = true;
    document.getElementById('send-btn').disabled = true;

    const msgs = document.getElementById('messages');
    document.getElementById('welcome')?.remove();

    msgs.appendChild(createMsg('user', text));
    input.value = '';
    input.style.height = 'auto';

    const typing = document.createElement('div');
    typing.className = 'msg ai';
    typing.id = 'typing';
    typing.innerHTML = `
      <div class="msg-avatar">AI</div>
      <div class="msg-body">
        <div class="typing-indicator">
          <div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div>
        </div>
      </div>`;
    msgs.appendChild(typing);
    msgs.scrollTop = msgs.scrollHeight;

    try {
      const res = await callRAG(text);
      document.getElementById('typing')?.remove();
      msgs.appendChild(createMsg('ai', res.text, res.sources));
    } catch(e) {
      document.getElementById('typing')?.remove();
      msgs.appendChild(createMsg('ai', 'Error al conectar con el backend.'));
    }

    msgs.scrollTop = msgs.scrollHeight;
    isLoading = false;
    document.getElementById('send-btn').disabled = false;
    input.focus();
  }

  function createMsg(role, text, sources = []) {
    const el = document.createElement('div');
    el.className = `msg ${role}`;
    const now = new Date().toLocaleTimeString('es', { hour: '2-digit', minute: '2-digit' });
    const sourcesHtml = sources.length
      ? `<div class="msg-sources">${sources.map(s => `<span class="source-chip">📄 ${s}</span>`).join('')}</div>`
      : '';
    const content = role === 'ai' ? renderMarkdown(text) : text;
    el.innerHTML = `
      <div class="msg-avatar">${role === 'ai' ? 'AI' : 'TÚ'}</div>
      <div class="msg-body">
        <div class="msg-meta">${role === 'ai' ? 'RAG Assistant' : 'Tú'} · ${now}</div>
        <div class="msg-bubble">${content}</div>
        ${sourcesHtml}
      </div>`;
    return el;
  }
</script>
</body>
</html>
