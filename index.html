<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Chatbot</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #eef1f7;
    --surface: #1e2a3a;
    --surface2: #f4f6fb;
    --border: #d8dde8;
    --accent: #2563eb;
    --accent-light: #dbeafe;
    --accent2: #3b82f6;
    --text: #111827;
    --text-light: #6b7280;
    --user-bg: #1e3a5f;
    --user-text: #ffffff;
    --ai-bg: #ffffff;
    --topbar-text: #ffffff;
    --radius: 20px;
    --font: 'Inter', sans-serif;
    --mono: 'JetBrains Mono', monospace;
    --shadow: 0 2px 16px rgba(30,42,58,0.08);
    --shadow-md: 0 4px 24px rgba(30,42,58,0.12);
  }

  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--text);
    height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
  }

  /* ── TOPBAR ── */
  #topbar {
    padding: 14px 20px;
    background: var(--surface);
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
    box-shadow: 0 2px 20px rgba(0,0,0,0.2);
  }

  .topbar-brand { display: flex; align-items: center; gap: 12px; }

  .logo-wrap {
    width: 38px; height: 38px;
    border-radius: 12px;
    background: rgba(255,255,255,0.12);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    border: 1px solid rgba(255,255,255,0.15);
  }

  .logo-wrap svg { width: 20px; height: 20px; }

  .topbar-info { display: flex; flex-direction: column; }
  .topbar-title { font-size: 15px; font-weight: 700; color: #ffffff; letter-spacing: -0.3px; }
  .topbar-subtitle { font-size: 11px; color: rgba(255,255,255,0.55); margin-top: 1px; }

  .topbar-right { display: flex; align-items: center; gap: 10px; }

  .status-pill {
    display: flex; align-items: center; gap: 6px;
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 20px;
    padding: 4px 10px;
    font-size: 11px;
    color: rgba(255,255,255,0.8);
  }

  .status-dot { width: 6px; height: 6px; border-radius: 50%; background: #4ade80; box-shadow: 0 0 0 2px rgba(74,222,128,0.3); }

  .icon-btn {
    width: 36px; height: 36px;
    border-radius: 10px;
    border: 1px solid rgba(255,255,255,0.15);
    background: rgba(255,255,255,0.08);
    color: rgba(255,255,255,0.7);
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px;
    transition: all 0.15s;
    -webkit-tap-highlight-color: transparent;
  }

  .icon-btn:hover, .icon-btn:active { background: rgba(255,255,255,0.18); color: #fff; }

  /* ── MESSAGES ── */
  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 24px 16px;
    display: flex;
    flex-direction: column;
    gap: 18px;
    scroll-behavior: smooth;
    -webkit-overflow-scrolling: touch;
  }

  #messages::-webkit-scrollbar { display: none; }

  /* ── WELCOME ── */
  .welcome {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 14px;
    text-align: center;
    padding: 32px 16px;
  }

  .welcome-avatar {
    width: 72px; height: 72px;
    border-radius: 22px;
    background: var(--surface);
    display: flex; align-items: center; justify-content: center;
    margin-bottom: 4px;
    box-shadow: var(--shadow-md);
  }

  .welcome-avatar svg { width: 32px; height: 32px; }

  .welcome-title { font-size: 22px; font-weight: 700; color: var(--text); letter-spacing: -0.5px; }
  .welcome-sub { font-size: 14px; color: var(--text-light); max-width: 280px; line-height: 1.65; }

  .welcome-hints {
    display: flex;
    flex-direction: column;
    gap: 8px;
    width: 100%;
    max-width: 340px;
    margin-top: 8px;
  }

  .hint-chip {
    font-size: 13px;
    padding: 13px 16px;
    border-radius: 14px;
    border: 1px solid var(--border);
    background: var(--ai-bg);
    color: var(--text);
    cursor: pointer;
    transition: all 0.15s;
    text-align: left;
    display: flex; align-items: center; gap: 10px;
    box-shadow: var(--shadow);
    -webkit-tap-highlight-color: transparent;
    font-family: var(--font);
    font-weight: 500;
  }

  .hint-arrow { color: var(--accent); font-weight: 700; font-size: 14px; flex-shrink: 0; }
  .hint-chip:hover, .hint-chip:active { background: var(--accent-light); border-color: var(--accent2); color: var(--accent); }

  /* ── MESSAGES ── */
  .msg { display: flex; gap: 10px; animation: fadeUp 0.2s ease; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .msg.user { flex-direction: row-reverse; align-self: flex-end; max-width: 82%; }
  .msg.ai   { align-self: flex-start; max-width: 90%; }

  .msg-avatar {
    width: 32px; height: 32px; min-width: 32px;
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-weight: 700;
    align-self: flex-end;
    font-family: var(--mono);
    font-size: 9px;
    letter-spacing: 0.5px;
    flex-shrink: 0;
    box-shadow: var(--shadow);
  }

  .msg.ai .msg-avatar   { background: var(--surface); color: #ffffff; }
  .msg.user .msg-avatar { background: var(--user-bg); color: white; }

  .msg-body { min-width: 0; display: flex; flex-direction: column; gap: 5px; }
  .msg.user .msg-body { align-items: flex-end; }

  .msg-bubble {
    padding: 13px 16px;
    border-radius: var(--radius);
    font-size: 14px;
    line-height: 1.75;
    box-shadow: var(--shadow);
  }

  .msg.ai .msg-bubble {
    background: var(--ai-bg);
    border: 1px solid var(--border);
    border-bottom-left-radius: 5px;
    color: var(--text);
  }

  .msg.user .msg-bubble {
    background: var(--user-bg);
    border-bottom-right-radius: 5px;
    color: var(--user-text);
  }

  .msg-bubble h2 { font-size: 14px; font-weight: 700; margin: 10px 0 5px; }
  .msg-bubble h3 { font-size: 13px; font-weight: 600; margin: 8px 0 4px; }
  .msg-bubble ul, .msg-bubble ol { padding-left: 18px; margin: 5px 0; }
  .msg-bubble li { margin: 3px 0; }
  .msg-bubble blockquote { border-left: 3px solid var(--accent); padding-left: 10px; margin: 6px 0; color: var(--text-light); font-style: italic; }
  .msg-bubble strong { font-weight: 600; }

  .msg-time { font-size: 10px; color: var(--text-light); padding: 0 4px; }
  .msg-sources { display: none; }

  /* ── TYPING ── */
  .typing-indicator {
    display: flex; align-items: center; gap: 5px;
    padding: 14px 16px;
    background: var(--ai-bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    border-bottom-left-radius: 5px;
    width: fit-content;
    box-shadow: var(--shadow);
  }

  .typing-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--text-light);
    animation: blink 1.2s ease-in-out infinite;
  }

  .typing-dot:nth-child(2) { animation-delay: 0.2s; }
  .typing-dot:nth-child(3) { animation-delay: 0.4s; }

  @keyframes blink {
    0%, 80%, 100% { opacity: 0.2; transform: scale(0.8); }
    40% { opacity: 1; transform: scale(1.1); }
  }

  /* ── INPUT ── */
  #input-area {
    flex-shrink: 0;
    padding: 12px 16px 20px;
    background: var(--surface);
    padding-bottom: max(20px, env(safe-area-inset-bottom));
  }

  .input-wrapper {
    display: flex;
    align-items: flex-end;
    gap: 10px;
    background: rgba(255,255,255,0.08);
    border: 1.5px solid rgba(255,255,255,0.12);
    border-radius: 26px;
    padding: 10px 10px 10px 18px;
    transition: all 0.2s;
  }

  .input-wrapper:focus-within {
    border-color: var(--accent2);
    background: rgba(255,255,255,0.12);
    box-shadow: 0 0 0 3px rgba(59,130,246,0.2);
  }

  #user-input {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: #ffffff;
    font-family: var(--font);
    font-size: 15px;
    line-height: 1.5;
    resize: none;
    max-height: 100px;
    min-height: 24px;
  }

  #user-input::placeholder { color: rgba(255,255,255,0.35); }

  #send-btn {
    width: 38px; height: 38px; min-width: 38px;
    border-radius: 50%;
    border: none;
    background: var(--accent);
    color: #fff;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
    align-self: flex-end;
    box-shadow: 0 2px 10px rgba(37,99,235,0.4);
    -webkit-tap-highlight-color: transparent;
  }

  #send-btn:hover { background: var(--accent2); transform: scale(1.05); }
  #send-btn:active { transform: scale(0.93); }
  #send-btn:disabled { background: rgba(255,255,255,0.15); box-shadow: none; cursor: not-allowed; transform: none; }

  .input-hint { display: none; }

  @media (min-width: 600px) {
    .input-hint { display: block; font-size: 11px; color: rgba(255,255,255,0.35); margin-top: 7px; text-align: center; }
    .input-hint kbd { font-family: var(--mono); background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.12); border-radius: 4px; padding: 1px 5px; font-size: 10px; color: rgba(255,255,255,0.5); }
    #messages { padding: 28px 24px; max-width: 740px; margin: 0 auto; width: 100%; align-self: center; }
    #input-area { max-width: 740px; margin: 0 auto; width: 100%; align-self: center; padding-bottom: 24px; }
    .msg.user { max-width: 72%; }
    .msg.ai   { max-width: 82%; }
    .welcome-hints { flex-direction: row; flex-wrap: wrap; justify-content: center; max-width: 500px; }
    .hint-chip { flex: 1; min-width: 140px; }
  }
</style>
</head>
<body>

<div id="topbar">
  <div class="topbar-brand">
    <div class="logo-wrap">
      <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
      </svg>
    </div>
    <div class="topbar-info">
      <span class="topbar-title">Chatbot</span>
      <span class="topbar-subtitle">Consulta tus documentos con IA</span>
    </div>
  </div>
  <div class="topbar-right">
    <div class="status-pill">
      <div class="status-dot"></div>
      <span>En línea</span>
    </div>
    <button class="icon-btn" title="Limpiar chat" onclick="clearChat()">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="3 6 5 6 21 6"></polyline>
        <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"></path>
        <path d="M10 11v6M14 11v6"></path>
      </svg>
    </button>
  </div>
</div>

<div id="messages">
  <div class="welcome" id="welcome">
    <div class="welcome-avatar">
      <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
      </svg>
    </div>
    <div class="welcome-title">Hola, ¿en qué te ayudo?</div>
    <div class="welcome-sub">Consulta cualquier cosa sobre tus documentos y te responderé al instante.</div>
    <div class="welcome-hints">
      <span class="hint-chip" onclick="useHint(this)"><span class="hint-arrow">→</span>¿Cuáles son los derechos fundamentales?</span>
      <span class="hint-chip" onclick="useHint(this)"><span class="hint-arrow">→</span>¿Qué dice sobre el presidente?</span>
      <span class="hint-chip" onclick="useHint(this)"><span class="hint-arrow">→</span>¿Cómo se reforma la constitución?</span>
    </div>
  </div>
</div>

<div id="input-area">
  <div class="input-wrapper">
    <textarea id="user-input" placeholder="Escribe tu pregunta..." rows="1" onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
    <button id="send-btn" onclick="sendMessage()" title="Enviar">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <line x1="22" y1="2" x2="11" y2="13"></line>
        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
      </svg>
    </button>
  </div>
  <div class="input-hint"><kbd>Enter</kbd> para enviar &nbsp;·&nbsp; <kbd>Shift+Enter</kbd> nueva línea</div>
</div>

<script>
  let isLoading = false;
  const LAMBDA_URL = "https://ah5tamym3lutzpcgilotqooj3m0vktgq.lambda-url.sa-east-1.on.aws/";

  async function callRAG(question) {
    const res = await fetch(LAMBDA_URL, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ question }),
    });
    if (!res.ok) throw new Error(`Error ${res.status}`);
    const data = await res.json();
    return { text: data.answer, sources: data.sources || [] };
  }

  function renderMarkdown(text) {
    return text
      .replace(/^## (.+)$/gm, '<h2>$1</h2>')
      .replace(/^### (.+)$/gm, '<h3>$1</h3>')
      .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
      .replace(/\*(.+?)\*/g, '<em>$1</em>')
      .replace(/^> (.+)$/gm, '<blockquote>$1</blockquote>')
      .replace(/^- (.+)$/gm, '<li>$1</li>')
      .replace(/^(\d+)\. (.+)$/gm, '<li>$2</li>')
      .replace(/\n\n/g, '<br><br>')
      .replace(/\n/g, '<br>');
  }

  function useHint(el) {
    const text = el.textContent.replace('→', '').trim();
    document.getElementById('user-input').value = text;
    sendMessage();
  }

  function clearChat() {
    document.getElementById('messages').innerHTML = `
      <div class="welcome" id="welcome">
        <div class="welcome-avatar">
          <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
          </svg>
        </div>
        <div class="welcome-title">Hola, ¿en qué te ayudo?</div>
        <div class="welcome-sub">Consulta cualquier cosa sobre tus documentos.</div>
        <div class="welcome-hints">
          <span class="hint-chip" onclick="useHint(this)"><span class="hint-arrow">→</span>¿Cuáles son los derechos fundamentales?</span>
          <span class="hint-chip" onclick="useHint(this)"><span class="hint-arrow">→</span>¿Qué dice sobre el presidente?</span>
          <span class="hint-chip" onclick="useHint(this)"><span class="hint-arrow">→</span>¿Cómo se reforma la constitución?</span>
        </div>
      </div>`;
  }

  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 100) + 'px';
  }

  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  }

  async function sendMessage() {
    const input = document.getElementById('user-input');
    const text = input.value.trim();
    if (!text || isLoading) return;

    isLoading = true;
    document.getElementById('send-btn').disabled = true;

    const msgs = document.getElementById('messages');
    document.getElementById('welcome')?.remove();

    msgs.appendChild(createMsg('user', text));
    input.value = '';
    input.style.height = 'auto';

    const typing = document.createElement('div');
    typing.className = 'msg ai';
    typing.id = 'typing';
    typing.innerHTML = `
      <div class="msg-avatar">AI</div>
      <div class="msg-body">
        <div class="typing-indicator">
          <div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div>
        </div>
      </div>`;
    msgs.appendChild(typing);
    msgs.scrollTop = msgs.scrollHeight;

    try {
      const res = await callRAG(text);
      document.getElementById('typing')?.remove();
      msgs.appendChild(createMsg('ai', res.text, res.sources));
    } catch(e) {
      document.getElementById('typing')?.remove();
      msgs.appendChild(createMsg('ai', 'Error al conectar con el backend. Intenta de nuevo.'));
    }

    msgs.scrollTop = msgs.scrollHeight;
    isLoading = false;
    document.getElementById('send-btn').disabled = false;
    input.focus();
  }

  function createMsg(role, text, sources = []) {
    const el = document.createElement('div');
    el.className = `msg ${role}`;
    const now = new Date().toLocaleTimeString('es', { hour: '2-digit', minute: '2-digit' });
    const content = role === 'ai' ? renderMarkdown(text) : text;
    el.innerHTML = `
      <div class="msg-avatar">${role === 'ai' ? 'AI' : 'TÚ'}</div>
      <div class="msg-body">
        <div class="msg-bubble">${content}</div>
        <div class="msg-time">${now}</div>
      </div>`;
    return el;
  }
</script>
</body>
</html>
